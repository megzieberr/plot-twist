name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          GHPAGES_BASE: /plot-twist/
          # Client-safe: the publishable key is designed for the browser; RLS guards the data.
          VITE_SUPABASE_URL: https://ualigeivktzubtmkdnek.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_Dk5UW8oSxfFg8IzrD3u30g_MXqLOznY
          # Functions-only Netlify site that holds the TMDB key
          VITE_API_BASE: https://plot-twist-api.netlify.app
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
